<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#eef4fb" />
    <title>TnT A股量化分析平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "Urbanist", "ui-sans-serif", "system-ui", "-apple-system", "BlinkMacSystemFont", "Segoe UI", "Microsoft YaHei", "sans-serif"],
            },
            colors: {
              ink: "#111827",
              muted: "#6b7280",
              brand: "#0ea5e9",
            },
            boxShadow: {
              glass: "0 20px 60px rgba(15,23,42,0.08)",
              glassHover: "0 24px 66px rgba(15,23,42,0.105)",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <svg class="svg-sprite" aria-hidden="true">
      <symbol id="i-activity" viewBox="0 0 24 24"><path d="M3 12h4l2-7 4 14 2-7h6"/></symbol>
      <symbol id="i-alert" viewBox="0 0 24 24"><path d="m12 3 10 18H2L12 3Z"/><path d="M12 9v5M12 17h.01"/></symbol>
      <symbol id="i-grid" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></symbol>
      <symbol id="i-chart" viewBox="0 0 24 24"><path d="M3 20h18M5 17l4-5 4 3 6-9"/><path d="m16 6 3 0 0 3"/></symbol>
      <symbol id="i-file" viewBox="0 0 24 24"><path d="M6 2h8l4 4v16H6z"/><path d="M14 2v5h5M9 12h6M9 16h6"/></symbol>
      <symbol id="i-calendar" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></symbol>
      <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></symbol>
      <symbol id="i-refresh" viewBox="0 0 24 24"><path d="M20 11a8 8 0 0 0-14.8-4L3 10"/><path d="M3 4v6h6M4 13a8 8 0 0 0 14.8 4L21 14"/><path d="M21 20v-6h-6"/></symbol>
      <symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 2 4 5v6c0 5.2 3.4 9.2 8 11 4.6-1.8 8-5.8 8-11V5l-8-3Z"/><path d="m8.5 12 2.2 2.2 4.8-5"/></symbol>
      <symbol id="i-target" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></symbol>
      <symbol id="i-building" viewBox="0 0 24 24"><path d="M4 21V5l8-3 8 3v16M2 21h20M8 7h2M14 7h2M8 11h2M14 11h2M8 15h2M14 15h2"/></symbol>
      <symbol id="i-trophy" viewBox="0 0 24 24"><path d="M8 3h8v5a4 4 0 0 1-8 0V3Z"/><path d="M8 5H4v2a4 4 0 0 0 4 4M16 5h4v2a4 4 0 0 1-4 4M12 12v5M8 21h8M9 17h6"/></symbol>
      <symbol id="i-history" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5M12 7v5l3 2"/></symbol>
      <symbol id="i-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 11v6M12 7h.01"/></symbol>
    </svg>

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script>
      const e = React.createElement;

      function cn() {
        return Array.from(arguments)
          .flat(Infinity)
          .filter(Boolean)
          .flatMap((item) => typeof item === "string" ? item.split(/\s+/) : Object.entries(item).filter((entry) => entry[1]).map((entry) => entry[0]))
          .filter(Boolean)
          .filter((item, index, list) => list.indexOf(item) === index)
          .join(" ");
      }

      function icon(name) {
        return `<svg aria-hidden="true"><use href="#${name}"></use></svg>`;
      }

      function htmlNode(tag, props, html) {
        return e(tag, Object.assign({}, props, { dangerouslySetInnerHTML: { __html: html } }));
      }

      function GlassCard(props) {
        const tag = props.as || "article";
        const className = cn("card rounded-3xl motion-enter", props.className);
        return htmlNode(tag, { id: props.id, className, style: { "--delay": `${props.delay || 0}s` } }, props.html || "");
      }

      function SectionTitle(eyebrow, title, desc, action) {
        return `<div class="card-head"><div><p class="eyebrow">${eyebrow}</p><h2>${title}</h2>${desc ? `<p>${desc}</p>` : ""}</div>${action || ""}</div>`;
      }

      function RiskBadge(id, text, className) {
        return `<strong id="${id}" class="badge ${className || "neutral"}">${text}</strong>`;
      }

      function MetricCard(props) {
        return GlassCard({
          className: cn("metric-card span-3", props.className),
          delay: props.delay,
          html: `<span>${icon(props.icon)}${props.title}</span><strong id="${props.valueId}">${props.value || "-"}</strong><small id="${props.captionId}">${props.caption || "等待数据"}</small>`,
        });
      }

      function StockTable() {
        return GlassCard({
          className: "stock-card span-4",
          delay: 0.12,
          html: `${SectionTitle("Pool", "股票池观察", "围绕当前报告标的与实时输入标的做轻量监控")}
            <div class="stock-table">
              <div><span>当前报告</span><strong id="heroTicker">A-SHARE</strong><em>报告标的</em></div>
              <div><span>最新价格</span><strong id="heroPrice">--</strong><em id="heroChange" class="price-change neutral">等待数据</em></div>
              <div><span>分析日期</span><strong id="analysisDate">-</strong><em>回测口径</em></div>
            </div>`,
        });
      }

      function TrendChart() {
        return GlassCard({
          id: "market",
          className: "chart-card span-8 section-block",
          delay: 0.1,
          html: `${SectionTitle("Trend", "资金流与价格趋势", "保留原始行情与量化画布绘制逻辑", '<span id="chartBadge" class="badge neutral">NO DATA</span>')}
            <div class="chart-legend"><span class="legend-price">价格</span><span class="legend-buy">净流入</span><span class="legend-sell">净流出</span></div>
            <canvas id="flowChart" width="920" height="390"></canvas>`,
        });
      }

      function TopNav() {
        const links = [
          ["#overview", "概览"],
          ["#market", "行情"],
          ["#backtest", "回测"],
          ["#financials", "财务"],
          ["#research", "研报"],
          ["#console", "分析控制台"],
          ["#history", "历史报告"],
        ];
        return htmlNode("header", { className: "top-nav" }, `
          <a class="brand" href="#overview" aria-label="TnT A股量化分析平台">
            <span class="brand-mark">T</span>
            <span class="brand-copy"><strong>TnT 量化</strong><small>A股研究系统</small></span>
          </a>
          <nav class="nav-links liquid-tabbar" aria-label="模块导航" style="--pill-x:5px;--pill-w:0px">
            <span class="nav-active-pill" data-layout-id="active-nav-pill" aria-hidden="true"></span>
            ${links.map((link, index) => `<a class="${index === 0 ? "active" : ""}" data-nav-link href="${link[0]}">${link[1]}</a>`).join("")}
          </nav>
          <div class="nav-actions"><span class="live-chip">Local API</span><a class="nav-button" href="#console">运行分析</a></div>
        `);
      }

      function Hero() {
        return htmlNode("section", { id: "overview", className: "hero-section section-block motion-enter", style: { "--delay": "0s" } }, `
          <div class="hero-copy">
            <p class="eyebrow">Quant Research Platform</p>
            <h1 id="pageTitle">A股策略监控台</h1>
            <p class="hero-text">面向 A 股标的的量化策略、资金流、财务质量与研究报告看板。界面层已重构为 iOS 风格玻璃质感，数据与业务逻辑继续由原项目接管。</p>
          </div>
          <div class="hero-panel rounded-3xl">
            <span>当前结论</span>
            ${RiskBadge("decisionBadge", "UNKNOWN")}
          </div>
        `);
      }

      function StrategyCard() {
        return GlassCard({
          className: "strategy-card span-4",
          delay: 0.14,
          html: `${SectionTitle("Strategy", "策略摘要", "入场、目标与退出条件")}
            <div class="strategy-signal"><span>当前动作</span><strong id="strategyAction">等待分析</strong><small id="strategyActionReason">生成策略后显示</small></div>
            <div class="brief-list">
              <div><span>入场参考</span><strong id="strategyEntry">-</strong></div>
              <div><span>收益目标</span><strong id="strategyTarget">-</strong></div>
              <div><span>退出条件</span><strong id="strategyExit">-</strong></div>
            </div>`,
        });
      }

      function RiskCard() {
        return GlassCard({
          className: "risk-card span-4",
          delay: 0.16,
          html: `${SectionTitle("Risk", "风险提示", "状态、风控价格与系统健康度")}
            <div id="statusLine" class="status-line">${icon("i-activity")}<span>初始化中</span></div>
            <div class="health-list compact">
              <div><span>多智能体报告</span><strong id="healthReport">待加载</strong></div>
              <div><span>资金流策略</span><strong id="healthQuant">待加载</strong></div>
              <div><span>财务与估值</span><strong id="healthFinancials">待加载</strong></div>
              <div><span>回测证据</span><strong id="healthBacktest">待加载</strong></div>
            </div>`,
        });
      }

      function BacktestSection() {
        return htmlNode("section", { id: "backtest", className: "dashboard-grid section-block lower-grid" }, `
          <article class="card rounded-3xl span-12 motion-enter">
            ${SectionTitle("Backtest", "单股回测与可行性证据", "", '<span id="backtestGrade" class="evidence-grade neutral">INSUFFICIENT SAMPLE</span>')}
            <div class="evidence-grid">
              <div class="gauge-card"><span>样本内证据评分</span><div id="evidenceGauge" class="evidence-gauge" style="--score:0deg"><strong id="evidenceScore">0</strong><small>/100</small></div><em id="evidenceLabel">等待回测</em></div>
              <div class="comparison-card"><div><span>策略复合收益</span><strong id="backtestReturn">-</strong></div><i><b id="strategyReturnBar"></b></i><div><span>同期基准收益</span><strong id="benchmarkReturn">-</strong></div><i><b id="benchmarkReturnBar"></b></i><div class="excess-callout"><span>超额收益</span><strong id="excessReturn">-</strong></div></div>
            </div>
            <div class="backtest-metrics">
              <article><span>完成交易</span><strong id="btTrades">0</strong><small>非重叠样本</small></article>
              <article><span>胜率</span><strong id="btWinRate">-</strong><small>盈利交易占比</small></article>
              <article><span>最大回撤</span><strong id="btDrawdown">-</strong><small>交易序列口径</small></article>
              <article><span>盈亏因子</span><strong id="btProfitFactor">-</strong><small>总盈利 / 总亏损</small></article>
              <article><span>平均持有</span><strong id="btHolding">-</strong><small>自然日</small></article>
            </div>
            <canvas id="backtestChart" width="1200" height="320"></canvas>
            <div class="table-scroll"><table class="trade-table"><thead><tr><th>信号日</th><th>入场日</th><th>退出日</th><th>入场价</th><th>退出价</th><th>净收益</th><th>持有</th><th>退出类型</th></tr></thead><tbody id="backtestTradeBody"><tr><td colspan="8" class="table-empty">暂无已完成交易</td></tr></tbody></table></div>
          </article>
        `);
      }

      function FinancialsSection() {
        return htmlNode("section", { id: "financials", className: "dashboard-grid section-block lower-grid" }, `
          <article class="card rounded-3xl span-12 motion-enter">
            ${SectionTitle("Financials", "财务质量与估值", '<span id="fundamentalSubtitle">Tushare 财务报表与每日估值</span>', '<span id="fundamentalBadge" class="badge neutral">LOADING</span>')}
            <div class="fundamental-metrics">
              <div><span>营业收入</span><strong id="fundRevenue">-</strong><small id="fundRevenueYoy">同比 -</small></div>
              <div><span>归母净利润</span><strong id="fundNetProfit">-</strong><small id="fundProfitYoy">同比 -</small></div>
              <div><span>ROE / 毛利率</span><strong id="fundReturns">-</strong><small id="fundNetMargin">净利率 -</small></div>
              <div><span>经营现金流</span><strong id="fundCashFlow">-</strong><small id="fundCashQuality">现金质量 -</small></div>
              <div><span>资产负债率</span><strong id="fundDebtRatio">-</strong><small id="fundCurrentRatio">流动比率 -</small></div>
              <div><span>PE / PB</span><strong id="fundValuation">-</strong><small id="fundValuationDate">估值日 -</small></div>
            </div>
            <div class="fundamental-visuals"><canvas id="fundamentalChart" width="920" height="340"></canvas><div id="fundamentalSummary" class="fundamental-summary"></div></div>
          </article>
        `);
      }

      function ResearchSection() {
        return htmlNode("section", { id: "research", className: "dashboard-grid section-block lower-grid" }, `
          <article class="card rounded-3xl report-card span-8 motion-enter">
            ${SectionTitle("Research", "研究报告中心")}
            <div class="tabbar" id="tabbar">
              <button class="tab active" data-section="complete" type="button">总报告</button>
              <button class="tab" data-section="quant" type="button">量化策略</button>
              <button class="tab" data-section="market" type="button">行情</button>
              <button class="tab" data-section="news" type="button">新闻政策</button>
              <button class="tab" data-section="fundamentals" type="button">基本面</button>
              <button class="tab" data-section="sentiment" type="button">情绪</button>
              <button class="tab" data-section="portfolio" type="button">组合决策</button>
              <button class="tab" data-section="fetchLog" type="button">抓取日志</button>
            </div>
            <div id="reportContent" class="markdown-view"></div>
          </article>
          <aside id="console" class="card rounded-3xl control-card span-4 section-block motion-enter">
            ${SectionTitle("Console", "分析控制台")}
            <label for="reportSelect">历史报告</label><select id="reportSelect"></select>
            <label for="tickerInput">股票代码</label><input id="tickerInput" autocomplete="off" placeholder="600519.SH" />
            <label for="dateInput">分析日期</label><input id="dateInput" type="date" />
            <button id="runQuantBtn" class="primary-button" type="button">生成量化策略</button>
            <button id="refreshFundamentalsBtn" class="ghost-button" type="button">刷新财务快照</button>
            <dl class="source-list"><div><dt>Report</dt><dd id="sourceReport">-</dd></div><div><dt>Quant</dt><dd id="sourceQuant">-</dd></div><div><dt>Financials</dt><dd id="sourceFundamentals">-</dd></div><div><dt>Log</dt><dd id="sourceLog">-</dd></div></dl>
          </aside>
        `);
      }

      function App() {
        return e(React.Fragment, null,
          e(TopNav),
          e("main", { className: "page-shell" },
            e(Hero),
            e("section", { className: "dashboard-grid first-screen", "aria-label": "总览指标" },
              e(MetricCard, { icon: "i-activity", title: "量化信号", valueId: "metricQuantSignal", captionId: "metricReason", delay: 0.02 }),
              e(MetricCard, { icon: "i-target", title: "建议买入区间", valueId: "metricDay0", captionId: "metricNetInflow", caption: "等待入场评估", delay: 0.04 }),
              e(MetricCard, { icon: "i-shield", title: "退出 / 风控", valueId: "metricLevels", captionId: "metricLatestClose", caption: "止盈 / 风控 -", delay: 0.06 }),
              e(MetricCard, { icon: "i-file", title: "主报告建议", valueId: "metricDecision", captionId: "metricModified", className: "accent-metric", delay: 0.08 }),
              e(MetricCard, { icon: "i-chart", title: "资金强度", valueId: "metricFlowRatio", captionId: "metricNetAmount", caption: "3日净流入 -", delay: 0.1 }),
              e(TrendChart),
              e(StockTable),
              e(StrategyCard),
              e(RiskCard)
            ),
            e("section", { className: "dashboard-grid section-block lower-grid" },
              e(GlassCard, { className: "span-8", delay: 0.03, html: `${SectionTitle("Insights", "政策、事件与情绪")}<div id="policyDigest" class="digest-list"></div>` }),
              e(GlassCard, { className: "span-4", delay: 0.04, html: `${SectionTitle("Sources", "研究完整度")}<p class="soft-note">研究完整度已整合到风险提示卡，保留原始状态字段与更新逻辑。</p>` })
            ),
            e(BacktestSection),
            e(FinancialsSection),
            e(ResearchSection),
            e("section", { id: "history", className: "dashboard-grid section-block lower-grid" },
              e(GlassCard, { className: "span-12", delay: 0.04, html: `${SectionTitle("History", "历史报告入口", "历史报告仍由分析控制台的下拉框读取，保留原项目的报告加载逻辑。", '<a class="ghost-link" href="#console">查看报告选择器</a>')}` })
            )
          )
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      const renderApp = () => root.render(e(App));
      if (ReactDOM.flushSync) ReactDOM.flushSync(renderApp);
      else renderApp();

      function updateLiquidNav(target) {
        const nav = document.querySelector(".liquid-tabbar");
        if (!nav) return;
        const links = Array.from(nav.querySelectorAll("[data-nav-link]"));
        const hash = target?.getAttribute?.("href") || window.location.hash || "#overview";
        const active = links.find((link) => link.getAttribute("href") === hash) || links[0];
        if (!active) return;
        links.forEach((link) => link.classList.toggle("active", link === active));
        const navBox = nav.getBoundingClientRect();
        const activeBox = active.getBoundingClientRect();
        nav.style.setProperty("--pill-x", `${activeBox.left - navBox.left}px`);
        nav.style.setProperty("--pill-w", `${activeBox.width}px`);
        nav.classList.remove("is-settled");
        window.setTimeout(() => nav.classList.add("is-settled"), 620);
      }

      window.setTimeout(() => {
        const nav = document.querySelector(".liquid-tabbar");
        if (!nav) return;
        updateLiquidNav();
        nav.addEventListener("click", (event) => {
          const link = event.target.closest("[data-nav-link]");
          if (link) updateLiquidNav(link);
        });
        window.addEventListener("hashchange", () => updateLiquidNav());
        window.addEventListener("resize", () => updateLiquidNav());
      }, 40);

      window.setTimeout(() => {
        const script = document.createElement("script");
        script.src = "app.js";
        document.body.appendChild(script);
      }, 0);
    </script>
  </body>
</html>
