storage:
  data_dir: ~/.tradingagents/hotspot_monitor
  report_dir: reports/hotspot
  history_days: 120
  use_cache: true

fetch:
  max_retries: 3
  retry_backoff_seconds: 1.0
  inter_request_seconds: 0.12
  trust_env_proxy: false

universe:
  include_markets: [主板, 创业板, 科创板]
  exclude_st: true
  exclude_bse: true
  min_listing_days: 60
  min_daily_amount_yuan: 50000000
  min_circ_mv_yuan: 2000000000

signals:
  sector:
    min_stock_count: 5
    min_triggered_stock_count: 2
  moneyflow:
    net_flow_ratio_threshold: 0.05
    big_elg_flow_ratio_threshold: 0.03
    short_window: 20
    long_window: 60
    zscore_threshold: 1.5
    percentile_threshold: 0.90
  block_trade:
    premium_threshold: 0.03
    amount_ratio_threshold: 0.05
    min_amount_yuan: 10000000
  technical:
    ma_windows: [5, 10, 20]
    volume_window: 20
    volume_ratio_threshold: 1.30
    limit_down_risk_multiplier: 0.25

scoring:
  moneyflow_weight: 0.25
  big_elg_weight: 0.20
  block_trade_weight: 0.20
  liquidity_weight: 0.15
  technical_weight: 0.10
  sector_weight: 0.10
  stock_top_n: 30
  sector_top_n: 10

backtest:
  holding_days: [1, 3, 5, 10]
  buy_price_mode: next_open

scheduler:
  default_time: "19:30"
